version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: green_engine_db
    environment:
      POSTGRES_DB: green_engine
      POSTGRES_USER: green_user
      POSTGRES_PASSWORD: green_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U green_user -d green_engine"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: green_engine_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: green_engine_api
    ports:
      - "8010:8000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: green_engine
      DB_USER: green_user
      DB_PASSWORD: green_password
      DATABASE_URL: postgresql://green_user:green_password@postgres:5432/green_engine
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: green_engine_dashboard
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: