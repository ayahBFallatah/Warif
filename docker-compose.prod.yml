version: '3.8'

services:
  # PostgreSQL Database with TimescaleDB
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: green_engine_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-green_engine}
      POSTGRES_USER: ${DB_USER:-green_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_123}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
      - ./infrastructure/postgres/backups:/backups
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - green_engine_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-green_user} -d ${DB_NAME:-green_engine}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: green_engine_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secure_123}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - green_engine_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MQTT Broker (Eclipse Mosquitto)
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: green_engine_mosquitto
    volumes:
      - ./infrastructure/mosquitto/config:/mosquitto/config:ro
      - ./infrastructure/mosquitto/data:/mosquitto/data
      - ./infrastructure/mosquitto/logs:/mosquitto/logs
      - ./infrastructure/mosquitto/certs:/mosquitto/certs:ro
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_TLS_PORT:-8883}:8883"
      - "${MQTT_WS_PORT:-9001}:9001"
    networks:
      - green_engine_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "test", "-m", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Green Engine API
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: green_engine_api
    environment:
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-green_engine}
      - DB_USER=${DB_USER:-green_user}
      - DB_PASSWORD=${DB_PASSWORD:-secure_password_123}
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_secure_123}
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - MQTT_CMD_BASE=${MQTT_CMD_BASE:-greenengine}
      - WORKER_METRICS_PORT=9101
      - ENVIRONMENT=production
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "${API_PORT:-8010}:8000"
    volumes:
      - ./data/models:/app/data/models:ro
      - ./logs:/app/logs
    networks:
      - green_engine_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Command Worker
  command_worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: green_engine_worker
    environment:
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-green_engine}
      - DB_USER=${DB_USER:-green_user}
      - DB_PASSWORD=${DB_PASSWORD:-secure_password_123}
      - DB_PORT=5432
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - MQTT_CMD_BASE=${MQTT_CMD_BASE:-greenengine}
      - WORKER_METRICS_PORT=9101
      - ENVIRONMENT=production
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "${WORKER_METRICS_PORT:-9101}:9101"
    volumes:
      - ./logs:/app/logs
    networks:
      - green_engine_network
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9101/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ML Pipeline Service
  ml_pipeline:
    build:
      context: .
      dockerfile: Dockerfile.ml
    container_name: green_engine_ml
    environment:
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-green_engine}
      - DB_USER=${DB_USER:-green_user}
      - DB_PASSWORD=${DB_PASSWORD:-secure_password_123}
      - DB_PORT=5432
      - ENVIRONMENT=production
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data/models:/app/data/models
      - ./data/processed:/app/data/processed
      - ./logs:/app/logs
    networks:
      - green_engine_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s

  # Streamlit Dashboard
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: green_engine_dashboard
    environment:
      - API_BASE_URL=http://api:8000
      - ENVIRONMENT=production
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "${DASHBOARD_PORT:-8501}:8501"
    volumes:
      - ./logs:/app/logs
    networks:
      - green_engine_network
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: green_engine_prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    volumes:
      - ./infrastructure/monitoring/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - green_engine_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: green_engine_grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin_secure_123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana:/etc/grafana/provisioning:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    networks:
      - green_engine_network
    depends_on:
      - prometheus
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Traefik Reverse Proxy
  traefik:
    image: traefik:v2.10
    container_name: green_engine_traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
      - "${TRAEFIK_DASHBOARD_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_data:/letsencrypt
    networks:
      - green_engine_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  traefik_data:
    driver: local

networks:
  green_engine_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
