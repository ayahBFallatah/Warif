# Warif Enhanced Mosquitto Configuration
# =============================================

# Basic Configuration
pid_file /mosquitto/run/mosquitto.pid
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/logs/mosquitto.log
log_dest stdout
log_type all
log_timestamp true

# Security Settings - CRITICAL FOR PRODUCTION
allow_anonymous false
password_file /mosquitto/config/passwords
acl_file /mosquitto/config/acl

# TLS Configuration for Production
listener 8883
cafile /mosquitto/config/certs/ca.crt
certfile /mosquitto/config/certs/server.crt
keyfile /mosquitto/config/certs/server.key
require_certificate true
use_identity_as_username true
tls_version tlsv1.2

# Development Listener (remove in production)
listener 1883
allow_anonymous true

# WebSocket Support
listener 9001
protocol websockets
allow_anonymous true

# Performance Tuning
max_inflight_messages 20
max_queued_messages 100
max_packet_size 1024
max_packet_size 1024

# Connection Limits
max_connections 100
connection_messages true

# Bridge Configuration (for future multi-location setup)
# connection bridge-01
# address your-remote-broker:8883
# topic greenengine/+/telemetry out 1
# topic greenengine/+/command in 1
